<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<title>Super Hopper 🍄</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #000; touch-action: none;
    -webkit-user-select: none; user-select: none;
    font-family: -apple-system, "Helvetica Neue", sans-serif;
  }
  #game-wrap {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #000;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    max-width: 100%; max-height: 100%;
  }
  .btn {
    position: fixed; z-index: 10;
    width: 64px; height: 64px;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    border: 2px solid rgba(255,255,255,0.45);
    color: #fff; font-size: 26px; font-weight: bold;
    display: flex; align-items: center; justify-content: center;
    touch-action: none;
  }
  .btn.pressed { background: rgba(255,255,255,0.45); }
  #btn-left  { left: 18px;  bottom: 28px; }
  #btn-right { left: 100px; bottom: 28px; }
  #btn-jump  { right: 22px; bottom: 28px; width: 76px; height: 76px; background: rgba(230,60,60,0.35); border-color: rgba(255,120,120,0.7); }
  #rotate-hint {
    position: fixed; inset: 0; z-index: 50;
    background: rgba(0,0,0,0.85); color: #fff;
    display: none; align-items: center; justify-content: center;
    text-align: center; font-size: 18px; padding: 20px;
  }
</style>
</head>
<body>
<div id="game-wrap"><canvas id="c"></canvas></div>
<div class="btn" id="btn-left">◀</div>
<div class="btn" id="btn-right">▶</div>
<div class="btn" id="btn-jump">A</div>
<div id="rotate-hint">📱 Vend din telefon om på siden (landscape) for den bedste oplevelse – men du kan også spille på højkant!</div>

<script>
"use strict";

/* ====================== Setup ====================== */
const TILE = 32;
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let VIEW_W = 640, VIEW_H = 360;
function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = window.innerWidth, h = window.innerHeight;
  // Logisk opløsning: fast højde på ~360 px, bredde efter skærmens forhold
  VIEW_H = 360;
  VIEW_W = Math.round(VIEW_H * (w / h));
  VIEW_W = Math.max(420, Math.min(VIEW_W, 900));
  canvas.width = VIEW_W * dpr;
  canvas.height = VIEW_H * dpr;
  canvas.style.width = w + "px";
  canvas.style.height = h + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.imageSmoothingEnabled = false;
}
window.addEventListener("resize", resize);
resize();

/* ====================== Level ======================
   # = jord   B = mursten   ? = ?-blok (mønt)   X = brugt blok
   o = mønt   E = fjende    P = rørtop  p = rørkrop
   F = flagstang            . = luft
*/
const LEVEL = [
"................................................................................................................................",
"................................................................................................................................",
"................................................................................................................................",
"..................................................o.o.o........................................................................",
"...........................B?B..................BBBBBBB...........o.o..................o..o....................................",
"............................................................................BB?BB..............................F...............",
"......................................o..o.....................................................oo..............F...............",
"..........?.....BB?BB.......................................?...?......................BBBB...BBBB.............F...............",
".....................................BBB.......................................................................F...............",
"..............................................................................o..o.o..........................F...............",
"...................E...........P......E....E........P...........E....BBB....BBBBBBBB......E....E...............F...............",
"............o.o................p...............P....p.......................................................E..F...............",
"..........BBBBB....E...........p...E...........p....p....E.....E............................................BBBB...............",
"############################...####################.#############...####################..#####################################",
"############################...####################.#############...####################..#####################################",
];
const ROWS = LEVEL.length;
const COLS = Math.max(...LEVEL.map(r => r.length));
// Sørg for at alle rækker har samme bredde
for (let i = 0; i < ROWS; i++) LEVEL[i] = LEVEL[i].padEnd(COLS, i >= ROWS - 2 ? "#" : ".");

let tiles, coins, enemies, player, camX, score, lives, gameState, winTimer, time;

function isSolid(t) { return t === "#" || t === "B" || t === "?" || t === "X" || t === "P" || t === "p"; }

function tileAt(col, row) {
  if (col < 0 || col >= COLS) return "#";
  if (row < 0) return ".";
  if (row >= ROWS) return ".";
  return tiles[row][col];
}
function setTile(col, row, t) {
  if (row >= 0 && row < ROWS && col >= 0 && col < COLS) tiles[row][col] = t;
}

function resetLevel(fullReset) {
  tiles = LEVEL.map(r => r.split(""));
  coins = [];
  enemies = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const t = tiles[r][c];
      if (t === "o") {
        coins.push({ x: c * TILE + TILE / 2, y: r * TILE + TILE / 2, taken: false, ph: Math.random() * 6 });
        tiles[r][c] = ".";
      } else if (t === "E") {
        enemies.push({ x: c * TILE + 3, y: r * TILE + TILE - 28, w: 26, h: 28, vx: -40, dead: 0, alive: true });
        tiles[r][c] = ".";
      }
    }
  }
  player = {
    x: 2 * TILE, y: 10 * TILE,
    w: 22, h: 30,
    vx: 0, vy: 0,
    onGround: false,
    face: 1,
    invuln: 0,
    runFrame: 0,
  };
  camX = 0;
  winTimer = 0;
  time = 0;
  if (fullReset) { score = 0; lives = 3; }
  gameState = "play";
}
resetLevel(true);

/* ====================== Input ====================== */
const input = { left: false, right: false, jump: false, jumpHeld: false };

window.addEventListener("keydown", e => {
  if (e.code === "ArrowLeft" || e.code === "KeyA") input.left = true;
  if (e.code === "ArrowRight" || e.code === "KeyD") input.right = true;
  if (e.code === "ArrowUp" || e.code === "Space" || e.code === "KeyW") {
    if (!input.jumpHeld) input.jump = true;
    input.jumpHeld = true;
    e.preventDefault();
  }
  if (gameState !== "play" && (e.code === "Space" || e.code === "Enter")) handleRestartTap();
});
window.addEventListener("keyup", e => {
  if (e.code === "ArrowLeft" || e.code === "KeyA") input.left = false;
  if (e.code === "ArrowRight" || e.code === "KeyD") input.right = false;
  if (e.code === "ArrowUp" || e.code === "Space" || e.code === "KeyW") input.jumpHeld = false;
});

function bindButton(id, down, up) {
  const el = document.getElementById(id);
  const start = e => { e.preventDefault(); el.classList.add("pressed"); down(); };
  const end = e => { e.preventDefault(); el.classList.remove("pressed"); up(); };
  el.addEventListener("touchstart", start, { passive: false });
  el.addEventListener("touchend", end, { passive: false });
  el.addEventListener("touchcancel", end, { passive: false });
  el.addEventListener("mousedown", start);
  el.addEventListener("mouseup", end);
  el.addEventListener("mouseleave", e => { el.classList.remove("pressed"); up(); });
}
bindButton("btn-left", () => input.left = true, () => input.left = false);
bindButton("btn-right", () => input.right = true, () => input.right = false);
bindButton("btn-jump",
  () => { if (!input.jumpHeld) input.jump = true; input.jumpHeld = true; unlockAudio(); },
  () => { input.jumpHeld = false; });

canvas.addEventListener("touchstart", e => { e.preventDefault(); unlockAudio(); handleRestartTap(); }, { passive: false });
canvas.addEventListener("mousedown", () => { unlockAudio(); handleRestartTap(); });
document.body.addEventListener("touchmove", e => e.preventDefault(), { passive: false });

function handleRestartTap() {
  if (gameState === "dead" || gameState === "gameover" || gameState === "win") {
    resetLevel(gameState !== "dead");
  }
}

/* ====================== Lyd (WebAudio bip) ====================== */
let audioCtx = null;
function unlockAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
  }
  if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
}
function beep(freq, dur, type, vol, slide) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type || "square";
  o.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (slide) o.frequency.exponentialRampToValueAtTime(slide, audioCtx.currentTime + dur);
  g.gain.setValueAtTime(vol || 0.08, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
const sfx = {
  jump: () => beep(300, 0.25, "square", 0.06, 700),
  coin: () => { beep(988, 0.08, "square", 0.07); setTimeout(() => beep(1319, 0.25, "square", 0.07), 70); },
  stomp: () => beep(220, 0.18, "triangle", 0.1, 80),
  bump: () => beep(120, 0.1, "square", 0.08),
  die: () => beep(500, 0.6, "sawtooth", 0.08, 60),
  win: () => { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.2, "square", 0.07), i * 130)); },
};

/* ====================== Fysik ====================== */
const GRAV = 1500, MOVE = 1400, MAXVX = 210, FRICTION = 1200, JUMP_V = 560;

function moveAndCollide(ent, dt) {
  // Vandret
  ent.x += ent.vx * dt;
  let c0 = Math.floor(ent.x / TILE), c1 = Math.floor((ent.x + ent.w - 0.01) / TILE);
  let r0 = Math.floor(ent.y / TILE), r1 = Math.floor((ent.y + ent.h - 0.01) / TILE);
  if (ent.vx > 0) {
    for (let r = r0; r <= r1; r++) if (isSolid(tileAt(c1, r))) { ent.x = c1 * TILE - ent.w; ent.vx = 0; ent.hitWall = 1; break; }
  } else if (ent.vx < 0) {
    for (let r = r0; r <= r1; r++) if (isSolid(tileAt(c0, r))) { ent.x = (c0 + 1) * TILE; ent.vx = 0; ent.hitWall = -1; break; }
  }
  // Lodret
  ent.y += ent.vy * dt;
  c0 = Math.floor(ent.x / TILE); c1 = Math.floor((ent.x + ent.w - 0.01) / TILE);
  r0 = Math.floor(ent.y / TILE); r1 = Math.floor((ent.y + ent.h - 0.01) / TILE);
  ent.onGround = false;
  if (ent.vy > 0) {
    for (let c = c0; c <= c1; c++) if (isSolid(tileAt(c, r1))) { ent.y = r1 * TILE - ent.h; ent.vy = 0; ent.onGround = true; break; }
  } else if (ent.vy < 0) {
    for (let c = c0; c <= c1; c++) {
      const t = tileAt(c, r0);
      if (isSolid(t)) {
        ent.y = (r0 + 1) * TILE; ent.vy = 0;
        if (ent === player) headBump(c, r0, t);
        break;
      }
    }
  }
}

function headBump(c, r, t) {
  if (t === "?") {
    setTile(c, r, "X");
    score += 100;
    coins.push({ x: c * TILE + TILE / 2, y: r * TILE - TILE / 2, taken: true, pop: 0.5 });
    sfx.coin();
  } else if (t === "B") {
    setTile(c, r, ".");
    score += 10;
    sfx.bump();
  } else {
    sfx.bump();
  }
}

/* ====================== Opdatering ====================== */
function update(dt) {
  time += dt;
  if (gameState === "win") { winTimer += dt; return; }
  if (gameState !== "play") return;

  if (player.invuln > 0) player.invuln -= dt;

  // Bevægelse
  if (input.left) { player.vx -= MOVE * dt; player.face = -1; }
  else if (input.right) { player.vx += MOVE * dt; player.face = 1; }
  else {
    if (player.vx > 0) player.vx = Math.max(0, player.vx - FRICTION * dt);
    else player.vx = Math.min(0, player.vx + FRICTION * dt);
  }
  player.vx = Math.max(-MAXVX, Math.min(MAXVX, player.vx));

  if (input.jump && player.onGround) {
    player.vy = -JUMP_V;
    sfx.jump();
  }
  input.jump = false;
  // Variabel hoppehøjde
  if (!input.jumpHeld && player.vy < -200) player.vy = -200;

  player.vy += GRAV * dt;
  player.vy = Math.min(player.vy, 900);
  moveAndCollide(player, dt);

  if (Math.abs(player.vx) > 20 && player.onGround) player.runFrame += dt * 12;

  // Faldt i hul
  if (player.y > ROWS * TILE + 100) playerDie();

  // Mønter
  const px = player.x + player.w / 2, py = player.y + player.h / 2;
  for (const co of coins) {
    if (co.pop !== undefined) { co.pop -= dt; co.y -= 60 * dt; continue; }
    if (!co.taken && Math.abs(co.x - px) < 24 && Math.abs(co.y - py) < 26) {
      co.taken = true; score += 50; sfx.coin();
    }
  }
  coins = coins.filter(co => co.pop === undefined || co.pop > 0);

  // Fjender
  for (const en of enemies) {
    if (!en.alive) { en.dead += dt; continue; }
    if (Math.abs(en.x - player.x) > VIEW_W * 1.2) continue;
    en.hitWall = 0;
    en.vy = (en.vy || 0) + GRAV * dt;
    en.vy = Math.min(en.vy, 900);
    // Vend ved kant
    const aheadC = Math.floor((en.x + (en.vx > 0 ? en.w + 2 : -2)) / TILE);
    const footR = Math.floor((en.y + en.h + 2) / TILE);
    if (en.onGround && !isSolid(tileAt(aheadC, footR))) en.vx = -en.vx;
    moveAndCollide(en, dt);
    if (en.hitWall) en.vx = en.hitWall > 0 ? -40 : 40;

    // Kollision med spiller
    if (player.invuln <= 0 &&
        player.x < en.x + en.w && player.x + player.w > en.x &&
        player.y < en.y + en.h && player.y + player.h > en.y) {
      if (player.vy > 100 && player.y + player.h - en.y < 18) {
        en.alive = false; en.dead = 0;
        player.vy = -350;
        score += 200;
        sfx.stomp();
      } else {
        playerDie();
      }
    }
  }
  enemies = enemies.filter(en => en.alive || en.dead < 0.5);

  // Flag = sejr
  const pc = Math.floor(px / TILE), pr = Math.floor(py / TILE);
  if (tileAt(pc, pr) === "F") {
    gameState = "win";
    score += 1000;
    sfx.win();
  }

  // Kamera (i verdenskoordinater — viewporten er skaleret med VIEW_H / (ROWS*TILE))
  const viewWorldW = VIEW_W / (VIEW_H / (ROWS * TILE));
  const target = player.x + player.w / 2 - viewWorldW * 0.4;
  camX += (target - camX) * Math.min(1, dt * 8);
  camX = Math.max(0, Math.min(camX, COLS * TILE - viewWorldW));
}

function playerDie() {
  if (player.invuln > 0) return;
  lives--;
  sfx.die();
  gameState = lives <= 0 ? "gameover" : "dead";
}

/* ====================== Tegning ====================== */
function draw() {
  // Himmel
  const grad = ctx.createLinearGradient(0, 0, 0, VIEW_H);
  grad.addColorStop(0, "#5C94FC");
  grad.addColorStop(1, "#9CCCFC");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, VIEW_W, VIEW_H);

  // Skyer & bakker (parallakse)
  drawClouds();
  drawHills();

  // Skaler verden så hele banens højde passer i viewporten
  ctx.save();
  const s = VIEW_H / (ROWS * TILE);
  ctx.scale(s, s);
  ctx.translate(-camX, 0);

  // Fliser
  const cStart = Math.floor(camX / TILE) - 1;
  const cEnd = Math.ceil((camX + VIEW_W / s) / TILE) + 1;
  for (let r = 0; r < ROWS; r++) {
    for (let c = Math.max(0, cStart); c <= Math.min(COLS - 1, cEnd); c++) {
      drawTile(tiles[r][c], c * TILE, r * TILE);
    }
  }

  // Mønter
  for (const co of coins) {
    if (co.taken && co.pop === undefined) continue;
    const wob = Math.sin(time * 6 + (co.ph || 0)) * 2;
    ctx.fillStyle = "#FFD700";
    ctx.beginPath();
    ctx.ellipse(co.x, co.y + wob, 7, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#FFA500";
    ctx.beginPath();
    ctx.ellipse(co.x, co.y + wob, 3, 6, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Fjender
  for (const en of enemies) drawEnemy(en);

  // Spiller
  if (gameState === "play" || gameState === "win") drawPlayer();

  ctx.restore();

  drawHUD();
  if (gameState === "dead") overlay("💀 Av!", "Tryk for at prøve igen — liv tilbage: " + lives);
  if (gameState === "gameover") overlay("GAME OVER", "Tryk for at starte forfra");
  if (gameState === "win") overlay("🏁 DU VANDT! 🎉", "Score: " + score + " — tryk for at spille igen");
}

function drawTile(t, x, y) {
  switch (t) {
    case "#":
      ctx.fillStyle = "#9C5A1C"; ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = "#C8824A";
      ctx.fillRect(x + 2, y + 2, 12, 12); ctx.fillRect(x + 18, y + 2, 12, 12);
      ctx.fillRect(x + 2, y + 18, 12, 12); ctx.fillRect(x + 18, y + 18, 12, 12);
      break;
    case "B":
      ctx.fillStyle = "#B5482A"; ctx.fillRect(x, y, TILE, TILE);
      ctx.strokeStyle = "#7C2D12"; ctx.lineWidth = 2;
      ctx.strokeRect(x + 1, y + 1, TILE - 2, TILE - 2);
      ctx.beginPath();
      ctx.moveTo(x, y + 16); ctx.lineTo(x + 32, y + 16);
      ctx.moveTo(x + 16, y); ctx.lineTo(x + 16, y + 16);
      ctx.moveTo(x + 8, y + 16); ctx.lineTo(x + 8, y + 32);
      ctx.moveTo(x + 24, y + 16); ctx.lineTo(x + 24, y + 32);
      ctx.stroke();
      break;
    case "?":
      ctx.fillStyle = "#FFA500"; ctx.fillRect(x, y, TILE, TILE);
      ctx.strokeStyle = "#7C4A00"; ctx.lineWidth = 2;
      ctx.strokeRect(x + 2, y + 2, TILE - 4, TILE - 4);
      ctx.fillStyle = "#FFF";
      ctx.font = "bold 20px sans-serif";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText("?", x + TILE / 2, y + TILE / 2 + 1);
      break;
    case "X":
      ctx.fillStyle = "#8B6F47"; ctx.fillRect(x, y, TILE, TILE);
      ctx.strokeStyle = "#5C4A30"; ctx.lineWidth = 2;
      ctx.strokeRect(x + 2, y + 2, TILE - 4, TILE - 4);
      break;
    case "P":
      ctx.fillStyle = "#1FA838"; ctx.fillRect(x - 4, y, TILE + 8, TILE);
      ctx.fillStyle = "#36D14E"; ctx.fillRect(x - 4, y, 8, TILE);
      ctx.strokeStyle = "#0A6B1D"; ctx.lineWidth = 2;
      ctx.strokeRect(x - 4, y, TILE + 8, TILE);
      break;
    case "p":
      ctx.fillStyle = "#1FA838"; ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = "#36D14E"; ctx.fillRect(x, y, 8, TILE);
      ctx.strokeStyle = "#0A6B1D"; ctx.lineWidth = 2;
      ctx.strokeRect(x, y, TILE, TILE);
      break;
    case "F": {
      ctx.fillStyle = "#DDD"; ctx.fillRect(x + TILE / 2 - 2, y, 4, TILE);
      // Flag kun på det øverste flag-felt i stangen
      if (tileAt(Math.round(x / TILE), Math.round(y / TILE) - 1) !== "F") {
        ctx.fillStyle = "#E33";
        ctx.beginPath();
        ctx.moveTo(x + TILE / 2 + 2, y + 2);
        ctx.lineTo(x + TILE / 2 + 26, y + 10);
        ctx.lineTo(x + TILE / 2 + 2, y + 18);
        ctx.closePath(); ctx.fill();
      }
      break;
    }
  }
}

function drawPlayer() {
  const p = player;
  if (p.invuln > 0 && Math.floor(time * 12) % 2 === 0) return;
  const x = p.x, y = p.y, f = p.face;
  ctx.save();
  ctx.translate(x + p.w / 2, y);
  ctx.scale(f, 1);
  ctx.translate(-p.w / 2, 0);
  // Ben (animeret)
  const legSwing = p.onGround && Math.abs(p.vx) > 20 ? Math.sin(p.runFrame) * 4 : 0;
  ctx.fillStyle = "#1B4FD8";
  ctx.fillRect(3 + legSwing, 22, 7, 8);
  ctx.fillRect(12 - legSwing, 22, 7, 8);
  // Krop (blå smækbukser)
  ctx.fillStyle = "#1B4FD8";
  ctx.fillRect(3, 14, 16, 9);
  // Trøje (rød)
  ctx.fillStyle = "#E32119";
  ctx.fillRect(2, 10, 18, 6);
  ctx.fillRect(0, 12, 4, 6);
  ctx.fillRect(18, 12, 4, 6);
  // Hoved
  ctx.fillStyle = "#FFC8A0";
  ctx.fillRect(4, 2, 14, 10);
  // Kasket
  ctx.fillStyle = "#E32119";
  ctx.fillRect(3, 0, 16, 4);
  ctx.fillRect(12, 3, 10, 3);
  // Øje
  ctx.fillStyle = "#000";
  ctx.fillRect(13, 5, 2, 3);
  // Overskæg
  ctx.fillRect(12, 9, 7, 2);
  ctx.restore();
}

function drawEnemy(en) {
  ctx.save();
  if (!en.alive) {
    ctx.translate(en.x + en.w / 2, en.y + en.h);
    ctx.scale(1, Math.max(0.15, 1 - en.dead * 3));
    ctx.translate(-(en.x + en.w / 2), -(en.y + en.h));
  }
  const x = en.x, y = en.y;
  // Krop
  ctx.fillStyle = "#8B4513";
  ctx.beginPath();
  ctx.ellipse(x + en.w / 2, y + en.h / 2 + 2, en.w / 2, en.h / 2 - 1, 0, 0, Math.PI * 2);
  ctx.fill();
  // Fødder
  const step = Math.sin(time * 10 + en.x) * 2;
  ctx.fillStyle = "#3D1F0A";
  ctx.fillRect(x + 1 + step, y + en.h - 5, 9, 5);
  ctx.fillRect(x + en.w - 10 - step, y + en.h - 5, 9, 5);
  // Øjne
  ctx.fillStyle = "#FFF";
  ctx.fillRect(x + 5, y + 7, 6, 8);
  ctx.fillRect(x + en.w - 11, y + 7, 6, 8);
  ctx.fillStyle = "#000";
  ctx.fillRect(x + 7, y + 10, 3, 4);
  ctx.fillRect(x + en.w - 9, y + 10, 3, 4);
  // Vrede bryn
  ctx.fillRect(x + 4, y + 5, 7, 2);
  ctx.fillRect(x + en.w - 11, y + 5, 7, 2);
  ctx.restore();
}

function drawClouds() {
  ctx.fillStyle = "rgba(255,255,255,0.9)";
  for (let i = 0; i < 8; i++) {
    const cx = ((i * 340 + 80 - camX * 0.3) % (VIEW_W + 300)) - 150 + (i % 2) * 40;
    const cy = 40 + (i % 3) * 35;
    ctx.beginPath();
    ctx.arc(cx, cy, 18, 0, Math.PI * 2);
    ctx.arc(cx + 22, cy - 6, 22, 0, Math.PI * 2);
    ctx.arc(cx + 46, cy, 18, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawHills() {
  ctx.fillStyle = "#3FA34D";
  for (let i = 0; i < 6; i++) {
    const hx = ((i * 520 - camX * 0.5) % (VIEW_W + 600)) - 300;
    ctx.beginPath();
    ctx.arc(hx, VIEW_H, 130 + (i % 2) * 60, Math.PI, 0);
    ctx.fill();
  }
}

function drawHUD() {
  ctx.fillStyle = "rgba(0,0,0,0.35)";
  ctx.fillRect(0, 0, VIEW_W, 30);
  ctx.fillStyle = "#FFF";
  ctx.font = "bold 16px sans-serif";
  ctx.textAlign = "left"; ctx.textBaseline = "middle";
  ctx.fillText("⭐ " + score, 12, 16);
  ctx.fillText("❤️ " + lives, 130, 16);
  ctx.textAlign = "right";
  ctx.fillText("🍄 Super Hopper", VIEW_W - 12, 16);
}

function overlay(title, sub) {
  ctx.fillStyle = "rgba(0,0,0,0.6)";
  ctx.fillRect(0, 0, VIEW_W, VIEW_H);
  ctx.fillStyle = "#FFF";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.font = "bold 42px sans-serif";
  ctx.fillText(title, VIEW_W / 2, VIEW_H / 2 - 26);
  ctx.font = "18px sans-serif";
  ctx.fillText(sub, VIEW_W / 2, VIEW_H / 2 + 22);
}

/* ====================== Loop ====================== */
let last = performance.now();
function frame(now) {
  let dt = (now - last) / 1000;
  last = now;
  dt = Math.min(dt, 1 / 30);
  update(dt);
  draw();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
