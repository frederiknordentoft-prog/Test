<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0a">
  <title>Physics demo</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 12px;
      padding-top: max(16px, env(safe-area-inset-top));
      padding-bottom: max(16px, env(safe-area-inset-bottom));
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }
    h1 {
      font-size: 14px;
      font-weight: 500;
      margin: 0 0 12px;
      color: #aaa;
      text-align: center;
    }
    .stage {
      position: relative;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      width: 100%;
      max-width: 800px;
    }
    canvas {
      display: block;
      width: 100%;
      height: 60vh;
      max-height: 500px;
      cursor: crosshair;
      touch-action: none;
      background: #1a1a1a;
    }
    .stats {
      position: absolute;
      top: 10px;
      left: 12px;
      font-size: 11px;
      color: #777;
      pointer-events: none;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 14px;
      width: 100%;
      max-width: 800px;
      justify-content: center;
    }
    button {
      background: #2a2a2a;
      color: #e0e0e0;
      border: 1px solid #3a3a3a;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      min-height: 44px;
      flex: 1 1 140px;
    }
    button:active { background: #3a3a3a; }
    @media (hover: hover) {
      button:hover { background: #3a3a3a; }
    }
    label {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #bbb;
      font-size: 14px;
      min-height: 44px;
      padding: 0 4px;
    }
    .toggle {
      flex: 1 1 140px;
      justify-content: center;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
    }
    .slider {
      flex: 1 1 200px;
      gap: 12px;
    }
    input[type="range"] {
      flex: 1;
      height: 32px;
      accent-color: #5ad;
    }
    input[type="checkbox"] {
      width: 22px;
      height: 22px;
      accent-color: #5ad;
    }
    .val {
      color: #888;
      min-width: 38px;
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-size: 13px;
    }
    .hint {
      font-size: 12px;
      color: #666;
      margin: 12px 0 0;
      text-align: center;
    }
    @media (max-width: 600px) {
      h1 { font-size: 13px; }
      canvas { height: 55vh; }
      button, .toggle, .slider { flex-basis: 100%; }
    }
  </style>
</head>
<body>
  <h1>Verlet · gravitation · luftmodstand · kollisioner</h1>

  <div class="stage">
    <canvas id="cv"></canvas>
    <div class="stats" id="stats">—</div>
  </div>

  <div class="controls">
    <button id="reset">Nulstil</button>
    <button id="drop">Slip 20 bolde</button>
    <button id="dropBoxes">Slip 6 kasser</button>
    <label class="toggle"><input type="checkbox" id="drag" checked> Luftmodstand</label>
    <label class="slider">g <input type="range" id="gravity" min="0" max="25" value="9.82" step="0.01"><span class="val" id="gravityVal">9.82</span></label>
    <label class="slider">e <input type="range" id="rest" min="0" max="1" value="0.6" step="0.01"><span class="val" id="restVal">0.60</span></label>
  </div>

  <p class="hint">Tryk for at slippe en bold · træk for at kaste</p>

  <script type="module">
    import { Engine, Body, Vec2 } from './index.js';

    const cv = document.getElementById('cv');
    const ctx = cv.getContext('2d');
    const SCALE = 50;
    const FIXED_DT = 1 / 120;
    const SUB_STEPS = 6;
    const SUB_DT = FIXED_DT / SUB_STEPS;

    let W = 16;
    let H = 10;
    let dpr = 1;

    const ui = {
      gravity: document.getElementById('gravity'),
      gravityVal: document.getElementById('gravityVal'),
      rest: document.getElementById('rest'),
      restVal: document.getElementById('restVal'),
      drag: document.getElementById('drag'),
      reset: document.getElementById('reset'),
      drop: document.getElementById('drop'),
      dropBoxes: document.getElementById('dropBoxes'),
      stats: document.getElementById('stats'),
    };

    let engine;
    let restitution = parseFloat(ui.rest.value);

    const palette = ['#5ad', '#7c6', '#fa6', '#e7a', '#9af', '#ec5'];
    const colorOf = new WeakMap();

    function spawn(x, y, vx = 0, vy = 0, radius = 0.2 + Math.random() * 0.2) {
      const body = engine.add(new Body({
        position: new Vec2(x, y),
        radius,
        mass: radius * radius * 10,
        restitution,
        friction: 0.15,
        dragCoefficient: 0.47,
      }));
      if (vx || vy) body.setVelocity(new Vec2(vx, vy), SUB_DT);
      colorOf.set(body, palette[(Math.random() * palette.length) | 0]);
      return body;
    }

    function spawnBox(x, y, vx = 0, vy = 0, w = 0.4 + Math.random() * 0.3, h = 0.4 + Math.random() * 0.3) {
      const body = engine.add(Body.box(w, h, {
        position: new Vec2(x, y),
        angle: (Math.random() - 0.5) * 0.8,
        mass: w * h * 8,
        restitution,
        friction: 0.3,
        dragCoefficient: 1.05,
      }));
      if (vx || vy) body.setVelocity(new Vec2(vx, vy), SUB_DT);
      colorOf.set(body, palette[(Math.random() * palette.length) | 0]);
      return body;
    }

    function resize() {
      dpr = window.devicePixelRatio || 1;
      const rect = cv.getBoundingClientRect();
      cv.width = Math.round(rect.width * dpr);
      cv.height = Math.round(rect.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      W = rect.width / SCALE;
      H = rect.height / SCALE;
      if (engine) engine.bounds = { minX: 0, minY: 0, maxX: W, maxY: H };
    }

    function reset() {
      engine = new Engine({
        gravity: new Vec2(0, parseFloat(ui.gravity.value)),
        airDensity: ui.drag.checked ? 1.225 : 0,
        bounds: { minX: 0, minY: 0, maxX: W, maxY: H },
        subSteps: SUB_STEPS,
        iterations: 6,
      });

      const ramp = engine.add(Body.box(Math.min(W * 0.5, 4), 0.2, {
        position: new Vec2(W * 0.55, H - 1.6),
        angle: -0.35,
        isStatic: true,
        friction: 0.4,
        restitution: 0.3,
      }));
      colorOf.set(ramp, '#444');

      const count = Math.max(6, Math.min(14, Math.round(W * 1.0)));
      for (let i = 0; i < count; i++) {
        spawn(W / 2 + (Math.random() - 0.5) * Math.min(W * 0.7, 6), 1 + Math.random() * 1.5);
      }
      for (let i = 0; i < 3; i++) {
        spawnBox(W / 2 + (Math.random() - 0.5) * Math.min(W * 0.5, 4), 0.5 + Math.random() * 1);
      }
    }

    ui.reset.addEventListener('click', reset);
    ui.drop.addEventListener('click', () => {
      for (let i = 0; i < 20; i++) {
        spawn(0.5 + Math.random() * Math.max(0.1, W - 1), 0.5 + Math.random() * 0.5);
      }
    });
    ui.dropBoxes.addEventListener('click', () => {
      for (let i = 0; i < 6; i++) {
        spawnBox(0.5 + Math.random() * Math.max(0.1, W - 1), 0.5 + Math.random() * 0.5);
      }
    });
    ui.gravity.addEventListener('input', () => {
      const g = parseFloat(ui.gravity.value);
      ui.gravityVal.textContent = g.toFixed(2);
      engine.gravity = new Vec2(0, g);
    });
    ui.rest.addEventListener('input', () => {
      restitution = parseFloat(ui.rest.value);
      ui.restVal.textContent = restitution.toFixed(2);
      for (const b of engine.bodies) b.restitution = restitution;
    });
    ui.drag.addEventListener('change', () => {
      engine.airDensity = ui.drag.checked ? 1.225 : 0;
    });

    let dragStart = null;
    let dragNow = null;

    function localPoint(e) {
      const rect = cv.getBoundingClientRect();
      return {
        x: (e.clientX - rect.left) / SCALE,
        y: (e.clientY - rect.top) / SCALE,
      };
    }

    cv.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      cv.setPointerCapture(e.pointerId);
      dragStart = localPoint(e);
      dragNow = { ...dragStart };
    });
    cv.addEventListener('pointermove', (e) => {
      if (dragStart) {
        e.preventDefault();
        dragNow = localPoint(e);
      }
    });
    cv.addEventListener('pointerup', (e) => {
      if (!dragStart) return;
      e.preventDefault();
      const end = localPoint(e);
      const vx = (end.x - dragStart.x) * 6;
      const vy = (end.y - dragStart.y) * 6;
      spawn(dragStart.x, dragStart.y, vx, vy, 0.25);
      dragStart = null;
      dragNow = null;
    });
    cv.addEventListener('pointercancel', () => {
      dragStart = null;
      dragNow = null;
    });

    let acc = 0;
    let lastTime = performance.now();
    let fpsFrames = 0;
    let fpsAccum = 0;
    let fps = 0;

    function render() {
      const cssW = cv.width / dpr;
      const cssH = cv.height / dpr;

      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(0, 0, cssW, cssH);

      ctx.strokeStyle = '#252525';
      ctx.lineWidth = 1;
      for (let x = 0; x <= W; x += 1) {
        ctx.beginPath();
        ctx.moveTo(x * SCALE + 0.5, 0);
        ctx.lineTo(x * SCALE + 0.5, cssH);
        ctx.stroke();
      }
      for (let y = 0; y <= H; y += 1) {
        ctx.beginPath();
        ctx.moveTo(0, y * SCALE + 0.5);
        ctx.lineTo(cssW, y * SCALE + 0.5);
        ctx.stroke();
      }

      for (const body of engine.bodies) {
        const c = colorOf.get(body) ?? '#5ad';
        ctx.fillStyle = c;
        if (body.shape === 'polygon') {
          const verts = body.worldVertices();
          ctx.beginPath();
          ctx.moveTo(verts[0].x * SCALE, verts[0].y * SCALE);
          for (let i = 1; i < verts.length; i++) {
            ctx.lineTo(verts[i].x * SCALE, verts[i].y * SCALE);
          }
          ctx.closePath();
          ctx.fill();
        } else {
          const px = body.position.x * SCALE;
          const py = body.position.y * SCALE;
          const rPx = body.radius * SCALE;
          ctx.beginPath();
          ctx.arc(px, py, rPx, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = 'rgba(0,0,0,0.45)';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(px, py);
          ctx.lineTo(px + Math.cos(body.angle) * rPx, py + Math.sin(body.angle) * rPx);
          ctx.stroke();
        }
      }

      if (dragStart && dragNow) {
        ctx.strokeStyle = '#888';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(dragStart.x * SCALE, dragStart.y * SCALE);
        ctx.lineTo(dragNow.x * SCALE, dragNow.y * SCALE);
        ctx.stroke();
        ctx.fillStyle = '#aaa';
        ctx.beginPath();
        ctx.arc(dragStart.x * SCALE, dragStart.y * SCALE, 5, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function frame(now) {
      const elapsed = Math.min(0.1, (now - lastTime) / 1000);
      lastTime = now;
      acc += elapsed;
      let steps = 0;
      while (acc >= FIXED_DT && steps < 8) {
        engine.step(FIXED_DT);
        acc -= FIXED_DT;
        steps++;
      }

      render();

      fpsFrames++;
      fpsAccum += elapsed;
      if (fpsAccum >= 0.5) {
        fps = fpsFrames / fpsAccum;
        fpsFrames = 0;
        fpsAccum = 0;
      }
      let circles = 0, polys = 0;
      for (const b of engine.bodies) {
        if (b.shape === 'polygon') polys++;
        else circles++;
      }
      ui.stats.textContent = `${circles} bolde · ${polys} kasser · ${fps.toFixed(0)} fps`;

      requestAnimationFrame(frame);
    }

    window.addEventListener('resize', () => {
      resize();
    });
    window.addEventListener('orientationchange', () => {
      setTimeout(resize, 200);
    });

    resize();
    reset();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
