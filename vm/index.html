<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>World Cup 2026</title>
<meta name="description" content="2026 FIFA World Cup — groups, fixtures, live results and the knockout bracket. Canada · Mexico · USA." />
<meta name="theme-color" content="#0b5cff" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#0a0a0b" media="(prefers-color-scheme: dark)" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="WC 2026" />
<link rel="apple-touch-icon" href="icon.svg" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%BD%3C/text%3E%3C/svg%3E" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ============ HEADER ============ -->
<header class="appbar">
  <div class="appbar-inner">
    <div class="brand">
      <span class="brand-ball" aria-hidden="true">⚽</span>
      <div class="brand-text">
        <span class="brand-title">World Cup 2026</span>
        <span class="brand-sub">Canada · Mexico · USA</span>
      </div>
    </div>
    <div class="appbar-actions">
      <button id="langBtn" class="lang-btn" type="button" title="Skift sprog / change language">
        <span id="langLabel">DA</span>
      </button>
      <button id="liveBadge" class="live-badge" type="button" title="Refresh results">
        <span class="live-dot"></span><span id="liveLabel">LIVE</span>
      </button>
    </div>
  </div>
</header>

<!-- ============ VIEWS ============ -->
<main id="main">

  <!-- GROUPS -->
  <section class="view" id="view-groups" data-view="groups">
    <div class="container" id="groupsGrid"></div>
  </section>

  <!-- MATCHES -->
  <section class="view" id="view-matches" data-view="matches" hidden>
    <div class="container">
      <div class="filter-row" id="dayFilter"></div>
      <div id="matchesList"></div>
    </div>
  </section>

  <!-- STATS -->
  <section class="view" id="view-stats" data-view="stats" hidden>
    <div class="container">
      <div class="stats-block"><h3 id="lblScorers"></h3><div id="statScorers"></div></div>
      <div class="stats-block"><h3 id="lblAssists"></h3><div id="statAssists"></div></div>
      <div class="stats-block"><h3 id="lblNumbers"></h3><div id="statNumbers"></div></div>
      <div class="stats-block"><h3 id="lblTeams"></h3><div id="statTeams"></div></div>
    </div>
  </section>

  <!-- KNOCKOUT -->
  <section class="view" id="view-knockout" data-view="knockout" hidden>
    <div class="container">
      <div class="bracket-intro">
        <h2 id="koTitle"></h2>
        <p id="koDesc"></p>
      </div>
      <div class="seg" id="koSeg" role="tablist">
        <button class="seg-btn active" data-ko="r32"></button>
        <button class="seg-btn" data-ko="path"></button>
      </div>
      <div id="r32List"></div>
      <div class="bracket" id="bracket" hidden></div>
      <div class="final-card" id="finalCard" hidden></div>
    </div>
  </section>

</main>

<!-- ============ BOTTOM NAV ============ -->
<nav class="tabbar" role="tablist">
  <button class="tab active" data-go="groups" role="tab">
    <span class="tab-ico">🏆</span><span class="tab-lbl">Groups</span>
  </button>
  <button class="tab" data-go="matches" role="tab">
    <span class="tab-ico">📅</span><span class="tab-lbl">Matches</span>
  </button>
  <button class="tab" data-go="stats" role="tab">
    <span class="tab-ico">📊</span><span class="tab-lbl">Stats</span>
  </button>
  <button class="tab" data-go="knockout" role="tab">
    <span class="tab-ico">🗺️</span><span class="tab-lbl">Bracket</span>
  </button>
</nav>

<!-- match detail sheet -->
<div id="sheetOverlay" class="sheet-overlay" hidden>
  <div class="sheet" id="sheet" role="dialog" aria-modal="true">
    <button class="sheet-close" id="sheetClose" aria-label="Close">×</button>
    <div id="sheetBody"></div>
  </div>
</div>

<div id="toast" class="toast" hidden></div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
