<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#152238"/>
      <stop offset="1" stop-color="#0b1424"/>
    </linearGradient>
  </defs>
  <!-- full-bleed background so the icon works as a maskable icon -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- content kept within the central safe zone -->
  <g stroke-linecap="round">
    <!-- drop ball -->
    <circle cx="168" cy="150" r="34" fill="#f8fafc"/>
    <!-- ramp -->
    <rect x="150" y="250" width="230" height="34" rx="17" fill="#38bdf8" transform="rotate(24 265 267)"/>
    <!-- target -->
    <circle cx="360" cy="392" r="52" fill="none" stroke="#22c55e" stroke-width="16"/>
    <circle cx="360" cy="392" r="18" fill="#22c55e"/>
  </g>
</svg>
