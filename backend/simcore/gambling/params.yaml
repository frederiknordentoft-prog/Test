# Parameter register for the Danish gambling-market simulation.
#
# Per the design perspective (fælde 3), this file is "as important as the code":
# every parameter must be either (a) calibratable against public data, or (b)
# justified by theory/literature. Each entry records value, unit, source,
# confidence and whether it must be swept in sensitivity analysis.
#
# confidence:  green  = official/published data
#              yellow = estimate / contested / derived
#              red    = no data — pure scenario assumption
#
# sensitivity: true  => must be varied in Monte Carlo sensitivity runs
#
# Values here are 2024/25 anchors and are also encoded in presets/dk_baseline.yaml.
# This register is the human-readable, source-annotated companion to that preset.

meta:
  vintage: "2024/2025"
  currency: DKK
  note: >
    Illustrative foresight, not a forecast. The four modelled tracks
    (lottery + scratch + casino + sports) sum to ~8.7 bn DKK BSI; total Danish
    BSI (~11.0 bn) additionally includes land-based casino and gaming machines,
    which are out of scope for the four-track view.

parameters:

  - name: bsi_total_all_gambling
    value: 11.0
    unit: bn_DKK
    source: "Spillemyndigheden — Spilmarkedet i tal 2024"
    confidence: green
    sensitivity: false
    note: "Whole market incl. land-based/machines; the 4 tracks are a subset."

  - name: annual_bsi_lottery
    value: 2.0
    unit: bn_DKK
    source: "Derived split of the ~2.8-3.0 bn monopoly block (Lotto+Eurojackpot)"
    confidence: yellow
    sensitivity: true
    note: "Lottery/scratch are bundled in public stats; split is an assumption."

  - name: annual_bsi_scratch
    value: 1.0
    unit: bn_DKK
    source: "Derived split of the ~2.8-3.0 bn monopoly block (Quick/Skrab)"
    confidence: yellow
    sensitivity: true

  - name: annual_bsi_casino
    value: 3.5
    unit: bn_DKK
    source: "Spillemyndigheden 2024 (+14.7 % YoY, growth engine, no calendar)"
    confidence: green
    sensitivity: false

  - name: annual_bsi_sports
    value: 2.21
    unit: bn_DKK
    source: "Spillemyndigheden 2024 (+1.2 % YoY, volatile, calendar-driven)"
    confidence: green
    sensitivity: false

  - name: gambling_tax_rate
    value: 0.28
    unit: fraction_of_BSI
    source: "Spilafgiftsloven — 28 % on the liberalized segment"
    confidence: green
    sensitivity: false

  - name: winnings_tax_free
    value: 1
    unit: bool
    source: "DK tax rules — winnings tax-free for players (onshore channeling driver)"
    confidence: green
    sensitivity: false

  - name: channelization_rate
    config_field: channelization_start
    value: 0.82
    unit: fraction
    source: "Contested: 72 % (H2 Gambling Capital) .. 91.5 % (Spillemyndigheden)"
    confidence: yellow
    sensitivity: true
    interval: [0.72, 0.92]
    note: "Treat as an interval. Report only conclusions robust across it (fælde 2)."

  - name: online_share
    value: 0.68
    unit: fraction
    source: "Spillemyndigheden"
    confidence: yellow
    sensitivity: false

  - name: mobile_share
    value: 0.70
    unit: fraction
    source: "Spillemyndigheden"
    confidence: green
    sensitivity: false

  - name: sports_seasonality_amplitude
    config_field: calendar.amplitude
    value: 0.45
    unit: fraction_month_on_month
    source: "Spillemyndigheden monthly stats: betting swung -46 % .. +14 % YoY in 2 months"
    confidence: green
    sensitivity: true

  - name: ds_bsi_2025
    value: 5.16
    unit: bn_DKK
    source: "Danske Spil annual report 2025"
    confidence: green
    sensitivity: false

  - name: ds_profit_2025
    value: 2.01
    unit: bn_DKK
    source: "Danske Spil annual report 2025"
    confidence: green
    sensitivity: false

  - name: udlodning_2025
    value: 1.79
    unit: bn_DKK
    source: "Danske Spil — distribution to sport/culture/associations"
    confidence: green
    sensitivity: false
    note: "Drives the udlodning feedback loop (stakeholder resistance to tightening)."

  - name: income_concentration_top_share
    value: 0.05
    unit: fraction_of_players
    source: "NO DK DATA — international prior (heavy-tailed spend)"
    confidence: red
    sensitivity: true
    note: >
      The single most important missing parameter (perspective §2.1/§10):
      what share of players make up what share of BSI. Must always be swept.

  - name: problem_gamblers_adults
    value: 500000
    unit: persons
    source: "Rambøll/Spillemyndigheden — adults with some gambling problem"
    confidence: green
    sensitivity: false

  - name: rofus_registered
    value: 60000
    unit: persons
    source: "Spillemyndigheden — ROFUS self-exclusion register"
    confidence: green
    sensitivity: false

  - name: young_male_rofus_share_under20
    value: 0.96
    unit: fraction
    source: "Spillemyndigheden — 96 % of ROFUS under-20 are men"
    confidence: green
    sensitivity: false
    note: "Young men are a distinct agent class, not a variation (perspective §2.1)."

  # ----------------------------------------------------------------------- #
  # Behavioural / mechanism parameters (added in the market-physics rework).
  # These are priors, not measurements — flagged red and swept accordingly.

  - name: spend_sigma
    config_field: spend_sigma
    value: 2.00
    unit: lognormal_sigma
    source: "ANCHORED: UK Patterns of Play (139k accounts) top-5 % = 67 % of online GGY; 2.00 gives ~64 % in-model"
    confidence: yellow
    sensitivity: true
    interval: [1.5, 2.5]
    note: >
      THE income-concentration knob. 1.10 gave top-5 % ≈ 30 % — far too thin;
      every policy conclusion scales with this (perspective §2.1). Always sweep.

  - name: risk_spend_coupling
    config_field: risk_spend_coupling
    value: 3.0
    unit: log_spend_per_risk_unit
    source: "NO DATA — prior; harm and spend are known to be concentrated in the same tail"
    confidence: red
    sensitivity: true
    interval: [0.0, 6.0]
    note: >
      Location shift of log-spend in latent risk: makes the top spenders
      disproportionately high-risk, so the tail is friction-tolerant and
      offshore-prone *in behaviour*, not only in the spend distribution.

  - name: participation_start
    config_field: participation_start
    value: 0.80
    unit: fraction_of_engaged_budget
    source: "NO DATA — scenario prior for the baseline outside-option share"
    confidence: red
    sensitivity: true
    interval: [0.6, 0.95]
    note: >
      Baseline share of track-engaged budget actually wagered; the rest sits in
      the outside option ("spiller ikke"). Gives total demand a participation
      margin so tightening can shrink the market, not only re-route it.

  - name: outside_risk_beta
    config_field: outside_risk_beta
    value: 2.0
    unit: utility_per_risk_unit
    source: "Theory: low-risk breadth players exit first; the tail keeps playing"
    confidence: red
    sensitivity: true
    interval: [0.5, 5.0]

  - name: offshore_affinity_beta
    config_field: offshore_affinity_beta
    value: 2.0
    unit: utility_per_propensity_unit
    source: "Theory: axis 5 (offshore propensity) must shift choices toward unlicensed"
    confidence: red
    sensitivity: true
    interval: [0.5, 5.0]

  - name: track_growth_casino
    value: 0.128
    unit: fraction_per_year
    source: "Hindcast-calibrated: recent 3-yr CAGR 2022->2025 (see casino_growth_calibrated). Single-year 2023->24 was +14.7 %."
    confidence: green
    sensitivity: false

  - name: track_growth_sports
    value: -0.008
    unit: fraction_per_year
    source: "Hindcast-calibrated: recent 3-yr CAGR 2022->2025 (near-flat/declining). Single-year 2023->24 was +1.2 %."
    confidence: green
    sensitivity: false

  - name: rtp_tax_passthrough
    config_field: rtp_tax_passthrough
    value: 0.5
    unit: fraction
    source: "NO DATA — assumed pass-through of extra tax into worse player odds"
    confidence: red
    sensitivity: true
    interval: [0.0, 1.0]

  - name: enforcement_friction
    config_field: enforcement_friction
    value: 0.6
    unit: friction_per_enforcement_unit
    source: "NO DATA — DNS/payment blocking raises OFFSHORE friction only (prediction is unblockable); decays via mirror sites"
    confidence: red
    sensitivity: true
    interval: [0.0, 2.0]

  - name: nest_lambda_licensed
    config_field: nest_lambda_licensed
    value: 0.5
    unit: dissimilarity
    source: "Theory (nested logit): substitution is mostly within-nest; no DK estimate"
    confidence: red
    sensitivity: true
    interval: [0.3, 1.0]
    note: "λ = 1 degrades to plain MNL (IIA). Governs how much an entrant cannibalizes incumbents vs. drains offshore."

  - name: nest_lambda_unlicensed
    config_field: nest_lambda_unlicensed
    value: 0.5
    unit: dissimilarity
    source: "Theory (nested logit) — offshore/prediction are close substitutes for the tail"
    confidence: red
    sensitivity: true
    interval: [0.3, 1.0]

  - name: entry_go_prob
    config_field: entry_go_prob
    value: 0.6
    unit: probability_per_evaluation
    source: "NO DATA — execution risk given a positive entry NPV (was an unregistered hardcode)"
    confidence: red
    sensitivity: true
    interval: [0.3, 0.9]

  - name: acquisition_multiple
    config_field: acquisition_multiple
    value: 2.0
    unit: years_of_profit
    source: "Rough M&A valuation prior (sector deals run wide); podium strategy targets strong brands"
    confidence: red
    sensitivity: true
    interval: [1.5, 6.0]

  - name: rofus_base_rate
    config_field: rofus_base_rate
    value: 0.01
    unit: monthly_hazard_scale
    source: "Set so the register stock is of the order of the real ~60k over a few simulated years"
    confidence: red
    sensitivity: true
    interval: [0.002, 0.03]
    note: "Effective hazard = rate × risk² × licensed-play; ~0.3 %/month for the escalated tail."

  - name: op_realloc_substitutability
    config_field: op_realloc_substitutability
    value: 0.6
    unit: fraction
    source: "Klub Lotto pattern (dossier §10.5): brand/F2P partially substitutes closed ad channels"
    confidence: red
    sensitivity: true
    interval: [0.2, 0.9]

  # Loop-/effect-strength constants that drive the headline conclusions —
  # previously hardcoded and unregistered (fælde 3). All red priors.

  - name: harm_scale
    config_field: harm_scale
    value: 15.0
    unit: index_scale
    source: "NO DATA — scales the player-level harm index to a ~0-100 dashboard range"
    confidence: red
    sensitivity: true
    interval: [8.0, 30.0]

  - name: offshore_harm_coeff
    config_field: offshore_harm_coeff
    value: 2.2
    unit: multiplier
    source: "Theory: no ROFUS/limits/detection offshore -> higher harm per krone; no DK estimate"
    confidence: red
    sensitivity: true
    interval: [1.2, 4.0]

  - name: ai_personalization_gain
    config_field: ai_personalization_gain
    value: 2.0
    unit: utility_per_capability
    source: "NO DATA — AI capability -> choice-utility bump (dossier cites +18 % retention potential)"
    confidence: red
    sensitivity: true
    interval: [0.5, 4.0]

  - name: ai_engagement_gain
    config_field: ai_engagement_gain
    value: 0.15
    unit: market_growth_per_capability
    source: "NO DATA — residual AI engagement channel on top of the observed track trends"
    confidence: red
    sensitivity: true
    interval: [0.0, 0.6]

  - name: political_threshold
    config_field: political_threshold
    value: 60.0
    unit: measured_harm_index
    source: "NO DATA — visible-harm level that triggers a tightening package"
    confidence: red
    sensitivity: true
    interval: [40.0, 90.0]

  - name: udlodning_resistance
    config_field: udlodning_resistance
    value: 0.35
    unit: threshold_multiplier
    source: "Structural (loop 3): the udlodning coalition raises the tightening bar; size unknown"
    confidence: red
    sensitivity: true
    interval: [0.0, 1.5]

  - name: loss_limit_harm_reduction
    config_field: loss_limit_harm_reduction
    value: 0.5
    unit: fraction
    source: "NO DK EVALUATION — assumed licensed-harm reduction from loss/deposit limits"
    confidence: red
    sensitivity: true
    interval: [0.2, 0.8]

  - name: logit_temperature
    config_field: logit_temperature
    value: 1.0
    unit: softmax_temperature
    source: "Unidentified scale — should be pinned against a natural experiment (Swedish bonus ban)"
    confidence: red
    sensitivity: true
    interval: [0.6, 2.0]

  - name: ds_profit_margin
    config_field: ds_profit_margin
    value: 0.389
    unit: fraction_of_BSI
    source: "Danske Spil annual report 2025: 2.008/5.158 bn"
    confidence: green
    sensitivity: false

  - name: monopoly_win_tax
    value: 0.15
    unit: fraction_of_BSI
    source: "Gevinstafgift 15 % of winnings ~= 15 % of BSI at ~50 % payout (approximation)"
    confidence: yellow
    sensitivity: false
    note: "Encoded as tax_rate on the monopoly tracks so state_revenue includes the monopoly's fiscal contribution."

  - name: customer_anchor_lottery
    value: 1400000
    unit: persons
    source: "Estimate: ~4.5 M adult Danes; lottery is the broadest vertical (user-calibrated, no official per-vertical customer statistics)"
    confidence: yellow
    sensitivity: true
    interval: [1000000, 1600000]
    note: "Baseline customers per vertical are anchored here; the choice model moves them."

  - name: customer_anchor_casino
    value: 450000
    unit: persons
    source: "Estimate: a few hundred thousand across all providers (300-800k band)"
    confidence: red
    sensitivity: true
    interval: [300000, 800000]

  - name: customer_anchor_sports
    value: 500000
    unit: persons
    source: "Estimate: a few hundred thousand across all providers (300-800k band)"
    confidence: red
    sensitivity: true
    interval: [300000, 800000]

  - name: licensed_operators_dk
    value: 54
    unit: licence_holders
    source: "Spillemyndigheden tilladelsesindehaver-register (juni 2026): 23 casino+betting, 12 kun casino, 14 begrænset casino, 5 kun betting"
    confidence: green
    sensitivity: false
    note: "~40 full-scale operators; the model names 5 as agents and aggregates ~35 in the long tail (longtail_licensees)."

  - name: dk_ggr_per_adult_eur
    value: 420
    unit: EUR_per_adult_per_year
    source: "Afledt: EGBA/H2 2024 — DK samlet GGR ~€1,9 mia. / ~4,5 mio. voksne"
    confidence: yellow
    sensitivity: false
    note: "Benchmark for eu_convergence-trenden."

  - name: uk_ggr_per_adult_eur
    value: 550
    unit: EUR_per_adult_per_year
    source: "Afledt: EGBA 2024 — UK GGR ~€30,8 mia. / ~55 mio. voksne"
    confidence: yellow
    sensitivity: false
    note: "Nordvesteuropæisk topniveau; gabet DK->UK (~+30 %) driver eu_convergence ved fuld styrke (+2,5 %/år over ~12 år)."

  - name: trend_regulatory_drift_full
    value: 0.010
    unit: rg_friction_per_month
    source: "Kalibreret: 5 års drift ved fuld styrke ~ én Spilpakke (EU-mønster: NL/DE/SE strammer løbende)"
    confidence: red
    sensitivity: true
    interval: [0.003, 0.02]

  # ----------------------------------------------------------------------- #
  # Real calibration data (flagship Etape A/B) — see calibration/ + manifest.

  - name: concentration_top5_all_online
    value: 0.6694
    unit: fraction_of_ggy
    source: "UK Patterns of Play (Forrest/McHale, Univ. Liverpool for NatCen/GambleAware), 139,152 accounts 2018/19"
    confidence: green
    sensitivity: false
    note: "The #1 data hole, now filled. Anchors spend_sigma. Casino/slots even higher (top-5 % = 82 %)."

  - name: concentration_top5_casino
    value: 0.8171
    unit: fraction_of_ggy
    source: "UK Patterns of Play — online slots/RNG, the most concentrated vertical"
    confidence: green
    sensitivity: false

  - name: casino_growth_calibrated
    value: 0.128
    unit: fraction_per_year
    source: "Hindcast (Etape B): recent 3-yr CAGR of Spillemyndigheden casino GGR 2022->2025 (3000->4310 mio)"
    confidence: green
    sensitivity: true
    interval: [0.05, 0.22]
    note: "Casino overtook betting in 2020 (COVID); accelerating (+22 % 2024->2025). Backtest MAPE 8.8 %, beats naive."

  - name: sports_growth_calibrated
    value: -0.008
    unit: fraction_per_year
    source: "Hindcast (Etape B): recent 3-yr CAGR of Spillemyndigheden betting GGR 2022->2025 (near-flat/declining)"
    confidence: green
    sensitivity: true
    interval: [-0.05, 0.05]
    note: "Betting is mature+volatile; the model does NOT beat a random-walk here (honest — flat series)."

  - name: sweden_casino_channelization
    value: 0.70
    unit: fraction
    source: "Spelinspektionen 2024 — online casino channelization (57 % ATG .. 78 % Copenhagen Economics)"
    confidence: yellow
    sensitivity: true
    interval: [0.57, 0.82]
    note: "Natural experiment (Etape C): bonus ban drives casino channelization far below betting (~95 %)."

  - name: ds_liberalized_share_observed
    value: 0.25
    unit: fraction
    source: "businessofigaming analyst 2026: Danske Spil ~24.6 % of the Danish ONLINE market (incl. online lottery)"
    confidence: red
    sensitivity: false
    note: "Different denominator than the model's ds_share_liberalized (licensed casino+sports); single analyst, MEDIUM. Reference only."

  - name: dk_licensees_total
    value: 54
    unit: licence_holders
    source: "Spillemyndigheden register (Jun 2026): 23 casino+betting, 12 casino-only, 14 limited casino, 5 betting-only"
    confidence: green
    sensitivity: false

  # ----------------------------------------------------------------------- #
  # Competitor & industry intelligence (companion) — operator P&L ratios,
  # calibrated to public annual reports. These turn commercial intensity into a
  # cost so an aggressive challenger's burn is visible and its runway can run
  # out. The *_ratio fields multiply reach/bonus, so the effective % of GGR is
  # lower than the coefficient (marketing ~20 % of GGR at reach 0.6).

  - name: econ_marketing_ratio
    config_field: econ_marketing_ratio
    value: 0.33
    unit: coeff_x_reach
    source: "Flutter 22.8 % of revenue on marketing; Kindred ~19 %, Evoke/888 ~25 % — × reach 0.6 ≈ 20 % of GGR"
    confidence: yellow
    sensitivity: true
    interval: [0.20, 0.50]
    note: "Monopoly pays 0.15× this (little acquisition marketing — retail/brand-led)."

  - name: econ_bonus_ratio
    config_field: econ_bonus_ratio
    value: 0.30
    unit: coeff_x_bonus
    source: "RSI ~17 % ad+promo; NGR/GGR bonus bridge 8-40 % across operators — × bonus 0.6 ≈ 18 % of GGR"
    confidence: red
    sensitivity: true
    interval: [0.15, 0.45]

  - name: econ_opex_ratio
    config_field: econ_opex_ratio
    value: 0.18
    unit: fraction_of_GGR
    source: "Platform/staff/compliance opex; residual so competitive EBIT lands 18-25 % (Betsson 23 %, Entain online 25 %)"
    confidence: red
    sensitivity: true
    interval: [0.10, 0.28]

  - name: econ_runway_multiple
    config_field: econ_runway_multiple
    value: 6.0
    unit: multiple_of_entry_cost
    source: "NO DATA — raised capital a challenger enters with, as a multiple of entry cost (VC/PE-style acquisition war-chest)"
    confidence: red
    sensitivity: true
    interval: [2.0, 12.0]
    note: "Governs how long a high-burn Betano-type can outspend its revenue before folding on economics."

  - name: econ_burn_grace
    config_field: econ_burn_grace
    value: 18
    unit: months
    source: "DraftKings cohort payback ~18 months (CAC $371 / LTV $2,546, 6.9× LTV/CAC) — burn tolerated before exit"
    confidence: red
    sensitivity: false
    interval: [12, 36]

  # Reference anchors (documentation; not wired to a config field) — the real
  # figures the P&L ratios and M&A logic are calibrated against.

  - name: flutter_marketing_pct_revenue
    value: 0.228
    unit: fraction_of_revenue
    source: "Flutter Entertainment annual report 2023: sales & marketing 22.8 % of revenue"
    confidence: green
    sensitivity: false

  - name: draftkings_ltv_cac
    value: 6.9
    unit: ratio
    source: "DraftKings investor materials: CAC ~$371, LTV ~$2,546 (~18-month payback) — acquisition-economics anchor"
    confidence: yellow
    sensitivity: false

  - name: ma_ev_ebitda_multiple
    value: 10.0
    unit: EV_EBITDA
    source: "Sector M&A 9-13× EBITDA (Kindred/FDJ 10.9×, Snai/Playtech 9.0×) — podium-strategy valuation band"
    confidence: yellow
    sensitivity: false
    note: "The model prices acquisitions on years-of-profit (acquisition_multiple) rather than EBITDA; this is the reality check."

  - name: casino_hold_pct
    value: 0.045
    unit: fraction_of_stakes
    source: "Online casino gross win margin 3-6 % of amounts staked (GGR/turnover); betting hold higher"
    confidence: yellow
    sensitivity: false

  - name: competitive_ebit_margin
    value: 0.22
    unit: fraction_of_revenue
    source: "Betsson 23.2 %, Entain online 25.3 %, Evoke ~18 % — competitive online EBIT margin band the P&L reproduces"
    confidence: green
    sensitivity: false
