name: DK Baseline (spilmarked)
description: >-
  Kalibreret dansk spilmarked 2024/25 — fire spor (lotterier, skrabelodder,
  online casino, sportsbetting). Illustrativ foresight, ikke prognose.
sim_domain: gambling
seed: 42
ticks: 60
tick_resolution: month
gambling:
  population: 500
  baseline_noise: 0.0
  channelization_start: 0.82
  channelization_low: 0.72
  channelization_high: 0.92
  calendar:
    enabled: true
    amplitude: 1.0
    start_month: 1
    tournament_ticks: [17, 18, 41, 42]   # EM/VM-somre (juni+juli, år 1 og 3)
    tournament_boost: 0.6
  # growth_rate = observed annual trend (dossier): casino is the growth engine
  # (+14.7 %), sports near-flat (+1.2 %), the monopoly block flat since 2012.
  tracks:
    # tax_rate 0.15 = gevinstafgift-approksimation (15 % af gevinster ≈ 15 % af BSI ved payout ~50 %)
    - track_id: lottery
      name: Lotterier
      competitive: false
      annual_bsi: 2.0
      tax_rate: 0.15
      seasonal: false
      growth_rate: 0.0
    - track_id: scratch
      name: Skrabelodder
      competitive: false
      annual_bsi: 1.0
      tax_rate: 0.15
      seasonal: false
      growth_rate: 0.0
    - track_id: casino
      name: Online casino
      competitive: true
      annual_bsi: 3.5
      tax_rate: 0.28
      seasonal: false
      growth_rate: 0.147
    - track_id: sports
      name: Sportsbetting
      competitive: true
      annual_bsi: 2.21
      tax_rate: 0.28
      seasonal: true
      growth_rate: 0.012
