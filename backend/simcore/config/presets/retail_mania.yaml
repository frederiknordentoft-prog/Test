name: Retail Mania
description: Retail-dominated, herd-driven market chasing momentum on social signals.
seed: 42
ticks: 500
tick_resolution: day
actors:
  retail:
    count: 200
    traits:
      herd_tendency: {dist: beta, params: {a: 6, b: 1.5}}
      overconfidence: {dist: beta, params: {a: 6, b: 2}}
    decision_models: {momentum: 0.45, imitation: 0.40, rules: 0.10, adaptive: 0.05}
  institutional: {count: 12}
  hedge_fund: {count: 10}
  bank: {count: 4}
  firm: {count: 25}
  supplier: {count: 18}
  customer: {count: 25}
  media: {count: 5}
  regulator: {count: 1}
market:
  sentiment_beta: 0.6
  impact_alpha: 0.05
events:
  - name: Viral bull story
    event_type: tech_breakthrough
    start_tick: 25
    magnitude: 0.8
  - name: Counter-rumor
    event_type: rumor
    start_tick: 120
    duration: 8
    magnitude: 1.0
    signal: {publicity: 0.1, credibility: 0.6, truth: 0.0}
