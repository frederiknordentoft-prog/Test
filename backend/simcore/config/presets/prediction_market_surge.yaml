name: Prediction market surge
description: 'Finansielt-produkt-smuthullet åbner: offshore/prediction-attraktivitet
  stiger (Robinhood/Coinbase-distribution). Illustrativ foresight.'
sim_domain: gambling
seed: 42
ticks: 72
tick_resolution: month
gambling:
  population: 500
  baseline_noise: 0.0
  channelization_start: 0.82
  channelization_low: 0.72
  channelization_high: 0.92
  calendar:
    enabled: true
    amplitude: 1.0
    start_month: 1
    tournament_ticks: [17, 18, 41, 42]   # EM/VM-somre (juni+juli, år 1 og 3)
    tournament_boost: 0.6
events:
# Strukturel diskontinuitet: prediction markets ankommer via fintech-app-
# distribution (Robinhood/Coinbase-stil) når smuthullet åbner — de starter
# på ~0 andel i baseline og kan ikke DNS-blokeres.
- name: Prediction-smuthullet åbner
  event_type: prediction_surge
  start_tick: 6
  duration: 6
  params:
    size: 4.0
  description: Finansielt-produkt-smuthullet åbner (fintech-distribution)
- name: Offshore surge
  event_type: offshore_surge
  start_tick: 6
  params:
    size: 0.2
  description: Crypto-arbitrage vokser i kølvandet
