name: Wild AI boom
description: Stejl AI-front + AI-gennembrud -> entrant-bølge (inkl. big-tech), personalisering
  og markedsvækst. Illustrativ foresight.
sim_domain: gambling
seed: 42
ticks: 72
tick_resolution: month
gambling:
  population: 500
  baseline_noise: 0.0
  channelization_start: 0.82
  channelization_low: 0.72
  channelization_high: 0.92
  calendar:
    enabled: true
    amplitude: 1.0
    start_month: 1
    tournament_every: 24                 # EM/VM-somre hvert andet år (juni+juli)
    tournament_offset: 17
    tournament_boost: 0.6
  ai_frontier_growth: 0.06
events:
- name: AI-gennembrud
  event_type: ai_breakthrough
  start_tick: 12
  params:
    size: 0.3
  description: Vild AI-udvikling
